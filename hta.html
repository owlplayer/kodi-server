<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargas Móviles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%;
            min-height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: Arial, sans-serif;
        }
        
        /* Empuja el botón hacia abajo */
        .contenido {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            padding-bottom: 20px;
        }
        
        .btn-verde {
            width: 100%;
            max-width: 300px;
            background-color: #28a745;
            color: white;
            padding: 16px 0;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            /* Sombra para que resalte */
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-verde:hover {
            background-color: #218838;
            box-shadow: 0 4px 20px rgba(40, 167, 69, 0.5);
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #999 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
        .btn-gris:hover {
            background-color: #6c757d !important;
            box-shadow: none !important;
        }
        
        .token-info {
            color: #444;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ==========================================
         BOTÓN (abajo del todo)
         ========================================== -->
    <div class="contenido">
        <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">Desbloquear</button>
        <div id="token-info" class="token-info"></div>
    </div>

    <!-- ==========================================
         ADSTERRA SOCIAL BAR (justo antes de </body>)
         ========================================== -->
    <script src="https://pl30356267.effectivecpmnetwork.com/62/0c/5b/620c5bdb5407c0cb7f17f61490f4edea.js"></script>

    <script>
        // ==========================================
        // VARIABLES
        // ==========================================
        const DURACION = 45;
        let tiempoRestante = DURACION;
        let activo = false;
        let temporizador = null;
        const boton = document.getElementById('boton_descarga');
        const tokenInfo = document.getElementById('token-info');

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO
        // ==========================================
        function iniciarConteo() {
            if (activo) return;
            
            boton.className = 'btn-gris';
            boton.textContent = `Espere ${tiempoRestante}s`;
            boton.disabled = true;
            activo = true;
            
            temporizador = setInterval(() => {
                tiempoRestante--;
                boton.textContent = `Espere ${tiempoRestante}s`;
                
                if (tiempoRestante <= 0) {
                    clearInterval(temporizador);
                    boton.className = 'btn-verde';
                    boton.textContent = 'Continuar Reproducción';
                    boton.disabled = false;
                    activo = false;
                }
            }, 1000);
        }

        // ==========================================
        // LEER TOKEN DE LA URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            tokenInfo.textContent = 'Token: ' + token;
        }
    </script>

</body>
</html>
