<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargas Móviles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%;
            height: 100%;
            max-height: 100vh;
            overflow: hidden;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .contenedor {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            max-width: 320px;
            height: 100vh;
            max-height: 100vh;
            padding: 0;
            gap: 0;
        }

        /* ==========================================
           ESPACIO SUPERIOR (In-Page Push aquí)
           ========================================== */
        .espacio-superior {
            flex: 1;
            width: 100%;
            min-height: 50px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* ==========================================
           BANNER FIJO (300x250)
           ========================================== */
        .banner-fijo {
            width: 300px;
            height: 250px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            margin: 0;
        }
        .banner-fijo iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ==========================================
           BOTÓN (pegado al borde inferior)
           ========================================== */
        .btn-verde {
            width: 300px;
            background-color: #28a745;
            color: white;
            padding: 12px 0;
            margin: 0;
            border-radius: 0 0 8px 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            line-height: 1.2;
            flex-shrink: 0;
        }
        .btn-verde .token {
            font-weight: normal;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #999 !important;
            cursor: not-allowed !important;
        }
        .btn-gris .token {
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="contenedor">

        <!-- ==========================================
             ESPACIO SUPERIOR (In-Page Push)
             ========================================== -->
        <div id="espacio-inpage" class="espacio-superior"></div>

        <!-- ==========================================
             BANNER FIJO (300x250)
             ========================================== -->
        <div id="banner-fijo" class="banner-fijo"></div>

        <!-- ==========================================
             BOTÓN
             ========================================== -->
        <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">
            Desbloquear
            <span class="token" id="token-info">Token: PRUEBA-123</span>
        </button>

    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN
        // ==========================================
        const DURACION_RONDA = 10;
        let tiempoTotal = DURACION_RONDA * 3;
        let rondaActual = 1;
        let activo = false;
        let temporizador = null;
        let rondasIniciadas = false;
        let inpageCargado = false;
        let bannerCargado = false;

        const boton = document.getElementById('boton_descarga');
        const espacioInpage = document.getElementById('espacio-inpage');
        const bannerFijo = document.getElementById('banner-fijo');

        // ==========================================
        // FUNCIÓN: CARGAR IN-PAGE PUSH
        // ==========================================
        function cargarInPagePush() {
            if (inpageCargado) return;
            inpageCargado = true;

            var script = document.createElement('script');
            script.src = 'https://pl30356267.effectivecpmnetwork.com/62/0c/5b/620c5bdb5407c0cb7f17f61490f4edea.js';
            script.async = true;
            espacioInpage.appendChild(script);
            console.log('📦 In-Page Push cargado en Ronda 2');
        }

        // ==========================================
        // FUNCIÓN: CARGAR BANNER FIJO
        // ==========================================
        function cargarBannerFijo() {
            if (bannerCargado) return;
            bannerCargado = true;

            var configScript = document.createElement('script');
            configScript.type = 'text/javascript';
            configScript.textContent = `
                atOptions = {
                    'key' : '5a9a95855c3eee1eddafaafd625faa2e',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;
            bannerFijo.appendChild(configScript);

            var invokeScript = document.createElement('script');
            invokeScript.type = 'text/javascript';
            invokeScript.src = 'https://www.highperformanceformat.com/5a9a95855c3eee1eddafaafd625faa2e/invoke.js';
            invokeScript.async = true;
            bannerFijo.appendChild(invokeScript);

            console.log('📦 Banner fijo cargado en Ronda 3');
        }

        // ==========================================
        // FUNCIÓN: CAMBIAR RONDA
        // ==========================================
        function cambiarRonda(ronda) {
            rondaActual = ronda;
            console.log(`📍 Ronda ${ronda} activa`);

            if (ronda === 2) {
                cargarInPagePush();
            } else if (ronda === 3) {
                cargarBannerFijo();
            }
        }

        // ==========================================
        // FUNCIÓN: INICIAR RONDAS AUTOMÁTICAMENTE
        // ==========================================
        function iniciarRondas() {
            if (rondasIniciadas) return;
            rondasIniciadas = true;

            console.log('🚀 Rondas iniciadas automáticamente al cargar la página');
            cambiarRonda(1);

            let contadorRonda = DURACION_RONDA;
            let rondaTemp = 1;

            temporizador = setInterval(() => {
                tiempoTotal--;
                contadorRonda--;

                if (activo) {
                    boton.innerHTML = `
                        ⏳ Espere ${tiempoTotal}s
                        <span class="token">Token: PRUEBA-123</span>
                    `;
                }

                if (contadorRonda <= 0 && rondaTemp < 3) {
                    rondaTemp++;
                    contadorRonda = DURACION_RONDA;
                    cambiarRonda(rondaTemp);
                }

                if (tiempoTotal <= 0) {
                    clearInterval(temporizador);
                    if (activo) {
                        boton.className = 'btn-verde';
                        boton.innerHTML = `
                            ✅ Continuar Reproducción
                            <span class="token">Token: PRUEBA-123</span>
                        `;
                        boton.disabled = false;
                        activo = false;
                    }
                }
            }, 1000);
        }

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO
        // ==========================================
        function iniciarConteo() {
            if (activo) return;

            boton.className = 'btn-gris';
            boton.innerHTML = `
                ⏳ Espere ${tiempoTotal}s
                <span class="token">Token: PRUEBA-123</span>
            `;
            boton.disabled = true;
            activo = true;
        }

        // ==========================================
        // LEER TOKEN DE LA URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token-info').textContent = 'Token: ' + token;
        }

        // ==========================================
        // 🚀 INICIAR RONDAS AL CARGAR
        // ==========================================
        window.addEventListener('load', function() {
            iniciarRondas();
        });
    </script>

</body>
</html>
