<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="hilltopads-site-verification" content="83b5dfc7d59a4cb128d4" />
    <title>Descargas Móviles</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #111; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; }
        .contenedor-anuncio { width: 300px; height: 250px; background-color: #222; margin: 5px 0; display: flex; align-items: center; justify-content: center; border-radius: 4px; overflow: hidden; border: 1px solid #333; position: relative; }
        .bloque-oculto { display: none !important; }
        .btn-bloqueado { display: block; width: 300px; background-color: #555; color: #aaa; padding: 14px 0; margin-top: 15px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 16px; cursor: not-allowed; border: none; }
        .btn-activo { background-color: #28a745 !important; color: white !important; cursor: pointer !important; }
    </style>
</head>
<body>

    <!-- ========================================================
         CONTENEDOR SUPERIOR (Intercambia HilltopAds por Monetag)
         ======================================================== -->
    <div class="contenedor-anuncio">
        
        <!-- [ANUNCIO 1] RONDA 1 SUPERIOR: HILLTOPADS -->
        <div id="anuncio_sup_ronda1">
            <script type="text/javascript">
                atOptions = {
                    'key' : 'f3dbdfc7d59a4cb128d4b3b5dfc7d59a',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="//://highperformanceformat.com"></script>
        </div>
        
        <!-- [ANUNCIO 3] RONDA 2 SUPERIOR: MONETAG (IN-PAGE PUSH) -->
        <div id="anuncio_sup_ronda2" class="bloque-oculto">
            <!-- El iframe forzado de Monetag se creará aquí en el segundo 5 -->
        </div>
        
    </div>


    <!-- ========================================================
         CONTENEDOR INFERIOR (Intercambia Adsterra por Relleno)
         ======================================================== -->
    <div class="contenedor-anuncio">
        
        <!-- [ANUNCIO 2] RONDA 1 INFERIOR: ADSTERRA -->
        <div id="anuncio_inf_ronda1">
            <script type="text/javascript">
                atOptions = {
                    'key' : 'de43b5dfc7d59a4cb128d4f3b5dfc7d59a',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="//://highperformanceformat.com"></script>
        </div>
        
        <!-- [ANUNCIO 4] RONDA 2 INFERIOR: RELLENO O PRÓXIMA RED -->
        <div id="anuncio_inf_ronda2" class="bloque-oculto">
            <p style="color: #666; font-size: 12px;">Cargando contenido premium...</p>
        </div>
        
    </div>

    <!-- BOTÓN DE DESCARGA CON TEMPORIZADOR -->
    <button id="boton_descarga" class="btn-bloqueado" disabled>Espere 11 segundos...</button>


<script>
    let segundos = 11;
    let ronda2Cargada = false;
    const boton = document.getElementById('boton_descarga');
    
    const supRonda1 = document.getElementById('anuncio_sup_ronda1');
    const supRonda2 = document.getElementById('anuncio_sup_ronda2');
    const infRonda1 = document.getElementById('anuncio_inf_ronda1');
    const infRonda2 = document.getElementById('anuncio_inf_ronda2');

    const temporizador = setInterval(() => {
        segundos--;
        boton.innerText = `Espere ${segundos} segundos...`;

        // AL SEGUNDO 5: OCURRE LA ROTACIÓN ASÍNCRONA
        if (segundos === 5 && !ronda2Cargada) {
            ronda2Cargada = true;
            
            // Ocultamos la Ronda 1 (HilltopAds y Adsterra desaparecen)
            supRonda1.classList.add('bloque-oculto');
            infRonda1.classList.add('bloque-oculto');
            
            // Mostramos los contenedores de la Ronda 2
            supRonda2.classList.remove('bloque-oculto');
            infRonda2.classList.remove('bloque-oculto');

            // ========================================================
            // INYECCIÓN OBLIGATORIA DE MONETAG (ZONA: 11272430)
            // Creamos un iframe blindado de 300x250 para aislar el script
            // ========================================================
            let iframeMonetag = document.createElement('iframe');
            iframeMonetag.width = "300";
            iframeMonetag.height = "250";
            iframeMonetag.style.border = "none";
            iframeMonetag.style.scrolling = "no";
            
            // Metemos el iframe dentro de la caja de la Ronda 2 Superior
            supRonda2.appendChild(iframeMonetag);
            
            // Escribimos el script de Monetag dentro del iframe para obligarlo a medir 300x250
            let doc = iframeMonetag.contentWindow.document;
            doc.open();
            doc.write(`
                <body style="margin:0; padding:0; background:transparent; display:flex; align-items:center; justify-content:center;">
                    <script>
                        (function(s){
                            s.dataset.zone='11272430';
                            s.src='https://nap5k.com';
                        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
                    <\/script>
                </body>
            `);
            doc.close();
        }

        // AL SEGUNDO 0: EL BOTÓN SE ACTIVA
        if (segundos <= 0) {
            clearInterval(temporizador);
            boton.innerText = "DESCARGAR AHORA";
            boton.classList.add('btn-activo');
            boton.removeAttribute('disabled');
        }
    }, 1000);

    // ACCIÓN DEL BOTÓN TOTALMENTE LIMPIA (SIN VIGNETTE)
    boton.addEventListener('click', () => {
        if (!boton.hasAttribute('disabled')) {
            window.location.href = "archivo1.zip"; 
        }
    });
</script>

</body>
</html>
