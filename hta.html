<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="hilltopads-site-verification" content="83b5dfc7d59a4cb128d4" />
    <title>Prueba In-Page Push</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #111; 
            color: #fff;
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        
        .btn-verde {
            display: block;
            width: 300px;
            background-color: #28a745;
            color: white;
            padding: 14px 0;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #ccc !important;
            cursor: not-allowed !important;
        }
        .btn-gris:hover {
            background-color: #6c757d !important;
        }
        
        .token-info {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
            word-break: break-all;
        }
        
        .estado-label {
            color: #555;
            font-size: 12px;
            margin-top: 5px;
        }
        
        #contenedor_inpage {
            width: 100%;
            max-width: 400px;
            min-height: 250px;
            margin: 10px 0;
            background-color: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- ==========================================
         CONTENEDOR PARA IN-PAGE PUSH
         ========================================== -->
    <div id="contenedor_inpage">
        <p style="color: #666; font-size: 13px; text-align: center; padding: 20px;">
            ⏳ Cargando In-Page Push...<br>
            <span style="color:#444; font-size: 11px;">Duración: 45 segundos</span>
        </p>
    </div>

    <!-- ==========================================
         ESTADO
         ========================================== -->
    <p class="estado-label" id="estado_label">📦 In-Page Push cargado automáticamente</p>

    <!-- ==========================================
         BOTÓN
         ========================================== -->
    <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">🔓 Desbloquear</button>

    <!-- ==========================================
         TOKEN
         ========================================== -->
    <div id="token-info" class="token-info">Token: PRUEBA-123</div>


<script>
    // ==========================================
    // 🚀 CARGAR IN-PAGE PUSH AL INICIO
    // ==========================================
    (function(cdqyl){
        var d = document,
            s = d.createElement('script'),
            l = d.scripts[d.scripts.length - 1];
        s.settings = cdqyl || {};
        s.src = "\/\/conventionalresponse.com\/boX\/VQsWd.GXlc0rYzWOcG\/FeGma9CuZZJUZlpk\/PkT\/cHyIMLjfAx1QMVjRkBt-NuzcIkyVMgD\/UozRMxwd";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
    })({})

    // ==========================================
    // VARIABLES
    // ==========================================
    const DURACION = 45;
    let tiempoRestante = DURACION;
    let activo = false;
    let temporizador = null;
    const boton = document.getElementById('boton_descarga');
    const estadoLabel = document.getElementById('estado_label');

    // ==========================================
    // FUNCIÓN: INICIAR CONTEO
    // ==========================================
    function iniciarConteo() {
        if (activo) return;
        
        // Cambiar botón a gris
        boton.className = 'btn-gris';
        boton.textContent = `⏳ Espere ${tiempoRestante} segundos...`;
        boton.disabled = true;
        activo = true;
        estadoLabel.textContent = '⏳ Conteo regresivo...';
        
        // Iniciar conteo
        temporizador = setInterval(() => {
            tiempoRestante--;
            boton.textContent = `⏳ Espere ${tiempoRestante} segundos...`;
            
            if (tiempoRestante <= 0) {
                clearInterval(temporizador);
                boton.className = 'btn-verde';
                boton.textContent = '✅ Continuar Reproducción';
                boton.disabled = false;
                activo = false;
                estadoLabel.textContent = '✅ Prueba completada';
            }
        }, 1000);
    }

    // ==========================================
    // LEER TOKEN DE LA URL
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        document.getElementById('token-info').textContent = 'Token: ' + token;
    }
</script>

</body>
</html>
