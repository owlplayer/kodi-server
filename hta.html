<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="hilltopads-site-verification" content="83b5dfc7d59a4cb128d4" />
    <title>Prueba HilltopAds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #111; 
            color: #fff;
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        
        .btn-verde {
            display: block;
            width: 300px;
            background-color: #28a745;
            color: white;
            padding: 14px 0;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #ccc !important;
            cursor: not-allowed !important;
        }
        .btn-gris:hover {
            background-color: #6c757d !important;
        }
        
        .token-info {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
            word-break: break-all;
        }
        
        .ronda-label {
            color: #555;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- ==========================================
         RONDA 1 (Popunder) - Se muestra al cargar
         ========================================== -->
    <div id="ronda1" style="display:block;"></div>

    <!-- ==========================================
         RONDA 2 (In-Page Push)
         ========================================== -->
    <div id="ronda2" style="display:none;">
        <div id="anuncio_inpage_ronda2"></div>
    </div>

    <!-- ==========================================
         RONDA 3 (Video Slider)
         ========================================== -->
    <div id="ronda3" style="display:none;">
        <div id="anuncio_video_ronda3"></div>
    </div>

    <!-- ==========================================
         RONDA LABEL
         ========================================== -->
    <p class="ronda-label" id="label_ronda">Ronda 1 activa</p>

    <!-- ==========================================
         BOTÓN
         ========================================== -->
    <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">🔓 Desbloquear</button>

    <!-- ==========================================
         TOKEN
         ========================================== -->
    <div id="token-info" class="token-info">Token: PRUEBA-123</div>


<script>
    // ==========================================
    // VARIABLES
    // ==========================================
    const DURACION_RONDA = 15; // 15 segundos por ronda
    let tiempoTotal = DURACION_RONDA * 3; // 45 segundos totales
    let conteoActivo = false;
    let rondaActual = 1;
    let temporizador = null;
    const boton = document.getElementById('boton_descarga');
    const labelRonda = document.getElementById('label_ronda');
    
    const ronda1 = document.getElementById('ronda1');
    const ronda2 = document.getElementById('ronda2');
    const ronda3 = document.getElementById('ronda3');
    
    const divInPage = document.getElementById('anuncio_inpage_ronda2');
    const divVideo = document.getElementById('anuncio_video_ronda3');

    // ==========================================
    // FUNCIÓN: CAMBIAR RONDA
    // ==========================================
    function cambiarRonda(ronda) {
        rondaActual = ronda;
        
        ronda1.style.display = 'none';
        ronda2.style.display = 'none';
        ronda3.style.display = 'none';
        
        if (ronda === 1) {
            ronda1.style.display = 'block';
            labelRonda.textContent = 'Ronda 1: Popunder';
            // Popunder ya se ejecutó al hacer clic en "Desbloquear"
        } else if (ronda === 2) {
            ronda2.style.display = 'block';
            labelRonda.textContent = 'Ronda 2: In-Page Push';
            cargarInPagePush();
        } else if (ronda === 3) {
            ronda3.style.display = 'block';
            labelRonda.textContent = 'Ronda 3: Video Slider';
            cargarVideoSlider();
        }
    }

    // ==========================================
    // FUNCIÓN: CARGAR IN-PAGE PUSH
    // ==========================================
    function cargarInPagePush() {
        divInPage.innerHTML = '';
        var script = document.createElement('script');
        script.innerHTML = `
        (function(cdqyl){
        var d = document,
            s = d.createElement('script'),
            l = d.scripts[d.scripts.length - 1];
        s.settings = cdqyl || {};
        s.src = "\/\/conventionalresponse.com\/boX\/VQsWd.GXlc0rYzWOcG\/FeGma9CuZZJUZlpk\/PkT\/cHyIMLjfAx1QMVjRkBt-NuzcIkyVMgD\/UozRMxwd";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
        })({})
        `;
        divInPage.appendChild(script);
    }

    // ==========================================
    // FUNCIÓN: CARGAR VIDEO SLIDER
    // ==========================================
    function cargarVideoSlider() {
        divVideo.innerHTML = '';
        var script = document.createElement('script');
        script.innerHTML = `
        (function(cbkw){
        var d = document,
            s = d.createElement('script'),
            l = d.scripts[d.scripts.length - 1];
        s.settings = cbkw || {};
        s.src = "\/\/conventionalresponse.com\/bUXoV.sld\/GTlJ0wYfWccm\/SeRmq9ruLZyUXlBksPeT\/cJydM-jMAj1rNADHU\/t-NGztIDy\/MxDXUZ0rOCQ-";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
        })({})
        `;
        divVideo.appendChild(script);
    }

    // ==========================================
    // FUNCIÓN: INICIAR CONTEO DESDE EL PRINCIPIO
    // ==========================================
    function iniciarConteo() {
        if (conteoActivo) return;
        
        // ==========================================
        // 🔥 POPUNDER (Ronda 1) - SE EJECUTA AL HACER CLIC
        // ==========================================
        (function(pqj){
        var d = document,
            s = d.createElement('script'),
            l = d.scripts[d.scripts.length - 1];
        s.settings = pqj || {};
        s.src = "\/\/crookedagreement.com\/cID.9N6\/bk2b5AllSuW_Ql9kNtzrIGyjMPDPU\/yJMySA0\/3QMLjQIqwyN\/TPIU1G";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
        })({})
        
        // Cambiar botón a gris
        boton.className = 'btn-gris';
        boton.textContent = `⏳ Espere ${tiempoTotal} segundos...`;
        boton.disabled = true;
        conteoActivo = true;
        
        // Mostrar Ronda 1
        cambiarRonda(1);
        
        // Iniciar el temporizador
        let tiempoRestante = tiempoTotal;
        let contadorRonda = DURACION_RONDA;
        let rondaActualTemp = 1;
        
        temporizador = setInterval(() => {
            tiempoRestante--;
            contadorRonda--;
            boton.textContent = `⏳ Espere ${tiempoRestante} segundos...`;
            
            // Cambiar de ronda cuando se acaba el tiempo
            if (contadorRonda <= 0 && rondaActualTemp < 3) {
                rondaActualTemp++;
                contadorRonda = DURACION_RONDA;
                cambiarRonda(rondaActualTemp);
            }
            
            // Finalizar
            if (tiempoRestante <= 0) {
                clearInterval(temporizador);
                boton.className = 'btn-verde';
                boton.textContent = '✅ Continuar Reproducción';
                boton.disabled = false;
                conteoActivo = false;
                labelRonda.textContent = '✅ Todas las rondas completadas';
            }
        }, 1000);
    }

    // ==========================================
    // INICIALIZAR: Mostrar Ronda 1 al cargar la página
    // ==========================================
    cambiarRonda(1);

    // Leer token de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        document.getElementById('token-info').textContent = 'Token: ' + token;
    }
</script>

</body>
</html>
