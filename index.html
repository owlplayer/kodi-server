<script>
    // ==========================================
    // PASO 3: LEER EL TOKEN DE LA URL
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    // Mostrar el token en la página (para depuración)
    const tokenInfo = document.getElementById('token-info');
    if (token) {
        tokenInfo.textContent = 'Token: ' + token;
    } else {
        tokenInfo.textContent = '⚠️ No se encontró token en la URL';
    }
    
    // ==========================================
    // CONFIGURACIÓN DEL SERVIDOR (ngrok)
    // ==========================================
    // 🔧 ACTUALIZA ESTA URL CON LA DE NGROK
    const SERVIDOR_URL = "https://makeshift-absently-diffusive.ngrok-free.dev";  // <--- ¡CAMBIA AQUÍ!
    
    // ==========================================
    // FUNCIÓN PARA DESBLOQUEAR EL TOKEN
    // ==========================================
    function desbloquearToken() {
        if (!token) {
            mostrarMensaje('❌ No hay token para desbloquear', 'error');
            return;
        }
        
        mostrarMensaje('⏳ Desbloqueando...', 'cargando');
        
        // Llamar al servidor
        fetch(`${SERVIDOR_URL}/desbloquear/${token}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    mostrarMensaje('✅ ¡Desbloqueado correctamente! Ya puedes ver en Kodi.', 'exito');
                } else if (data.status === 'warning') {
                    mostrarMensaje('⚠️ Este token ya fue desbloqueado.', 'error');
                } else {
                    mostrarMensaje('❌ Error: ' + data.mensaje, 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                mostrarMensaje('❌ Error al conectar con el servidor. ¿Está ngrok corriendo?', 'error');
            });
    }
    
    // ==========================================
    // FUNCIÓN PARA MOSTRAR MENSAJES DE ESTADO
    // ==========================================
    function mostrarMensaje(texto, tipo) {
        const mensajeEl = document.getElementById('mensaje-estado');
        mensajeEl.textContent = texto;
        mensajeEl.style.display = 'block';
        mensajeEl.className = 'mensaje-' + tipo;
    }
    
    // ==========================================
    // TEMPORIZADOR Y BOTÓN
    // ==========================================
    let segundos = 13;
    let ronda2Cargada = false;
    const boton = document.getElementById('boton_descarga');
    
    const supRonda1 = document.getElementById('anuncio_sup_ronda1');
    const supRonda2 = document.getElementById('anuncio_sup_ronda2');
    const infRonda1 = document.getElementById('anuncio_inf_ronda1');
    const infRonda2 = document.getElementById('anuncio_inf_ronda2');

    const temporizador = setInterval(() => {
        segundos--;
        boton.innerText = `Espere ${segundos} segundos...`;

        // AL SEGUNDO 5: OCURRE LA ROTACIÓN ASÍNCRONA LIMPIA
        if (segundos === 5 && !ronda2Cargada) {
            ronda2Cargada = true;
            
            // Ocultamos la Ronda 1
            supRonda1.classList.add('bloque-oculto');
            infRonda1.classList.add('bloque-oculto');
            
            // Mostramos los contenedores de la Ronda 2
            supRonda2.classList.remove('bloque-oculto');
            infRonda2.classList.remove('bloque-oculto');
        }

        // AL SEGUNDO 0: EL BOTÓN SE ACTIVA
        if (segundos <= 0) {
            clearInterval(temporizador);
            boton.innerText = "CONTINUAR REPRODUCCIÓN";
            boton.classList.add('btn-activo');
            boton.removeAttribute('disabled');
        }
    }, 1000);

    // ==========================================
    // ACCIÓN DEL BOTÓN (PASO 3: DESBLOQUEAR)
    // ==========================================
    boton.addEventListener('click', () => {
        if (!boton.hasAttribute('disabled')) {
            
            // Script del popunder (Zona: 11272681)
            (function(s){s.dataset.zone='11272681',s.src='https://al5sm.com'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));

            // Llamar a la función de desbloqueo
            desbloquearToken();
            
            // Redirigir a la página de éxito después de 1.5 segundos
            setTimeout(() => {
                // Puedes redirigir a una página de éxito o mostrar un mensaje
                // window.location.href = "exito.html";
            }, 1500);
        }
    });

</script>
