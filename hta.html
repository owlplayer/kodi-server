<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargas Móviles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%;
            min-height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: Arial, sans-serif;
        }
        
        /* Contenedor principal */
        .contenido {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            padding-bottom: 20px;
        }
        
        /* ==========================================
           CUADRO BANNER FIJO (Ronda 3) - 50px abajo del borde superior
           ========================================== */
        .banner-fijo {
            width: 300px;
            height: 250px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px; /* 50px abajo del borde superior */
            overflow: hidden;
            flex-shrink: 0;
        }
        .banner-fijo iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .banner-fijo .placeholder {
            color: #555;
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }
        
        /* ==========================================
           BOTÓN (50px hacia arriba desde el fondo)
           ========================================== */
        .btn-verde {
            width: 100%;
            max-width: 300px;
            background-color: #28a745;
            color: white;
            padding: 16px 0;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            transform: translateY(-50px);
        }
        .btn-verde:hover {
            background-color: #218838;
            box-shadow: 0 4px 20px rgba(40, 167, 69, 0.5);
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #999 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
        .btn-gris:hover {
            background-color: #6c757d !important;
            box-shadow: none !important;
        }
        
        .token-info {
            color: #444;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
            text-align: center;
            width: 100%;
            transform: translateY(-50px);
        }
    </style>
</head>
<body>

    <!-- ==========================================
         BANNER FIJO (Ronda 3) - 50px abajo del borde superior
         ========================================== -->
    <div id="banner-container" class="banner-fijo">
        <div class="placeholder" id="banner-placeholder">
            ⏳ Banner fijo (Ronda 3)<br>
            <span style="color:#444;font-size:11px;">Se cargará en la Ronda 3</span>
        </div>
    </div>

    <!-- ==========================================
         BOTÓN (50px hacia arriba)
         ========================================== -->
    <div class="contenido">
        <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">Desbloquear</button>
        <div id="token-info" class="token-info">Token: PRUEBA-123</div>
    </div>

    <!-- ==========================================
         SOCIAL BAR (se carga en Ronda 2)
         ========================================== -->
    <div id="social-bar-container"></div>

    <script>
        // ==========================================
        // VARIABLES
        // ==========================================
        const DURACION_RONDA = 10;
        let tiempoRestante = DURACION_RONDA * 3;
        let rondaActual = 1;
        let activo = false;
        let temporizador = null;
        let socialBarCargada = false;
        let bannerCargado = false;
        
        const boton = document.getElementById('boton_descarga');
        const bannerContainer = document.getElementById('banner-container');
        const bannerPlaceholder = document.getElementById('banner-placeholder');
        const socialContainer = document.getElementById('social-bar-container');

        // ==========================================
        // FUNCIÓN: CARGAR SOCIAL BAR (Ronda 2)
        // ==========================================
        function cargarSocialBar() {
            if (socialBarCargada) return;
            socialBarCargada = true;
            
            var script = document.createElement('script');
            script.src = 'https://pl30356267.effectivecpmnetwork.com/62/0c/5b/620c5bdb5407c0cb7f17f61490f4edea.js';
            script.async = true;
            document.body.appendChild(script);
            console.log('📦 Social Bar cargada en Ronda 2');
        }

        // ==========================================
        // FUNCIÓN: CARGAR BANNER FIJO (Ronda 3)
        // ==========================================
        function cargarBannerFijo() {
            if (bannerCargado) return;
            bannerCargado = true;
            
            // Reemplazar el placeholder con el código del banner
            bannerContainer.innerHTML = '';
            
            // Script de configuración
            var configScript = document.createElement('script');
            configScript.type = 'text/javascript';
            configScript.textContent = `
                atOptions = {
                    'key' : '5a9a95855c3eee1eddafaafd625faa2e',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;
            bannerContainer.appendChild(configScript);
            
            // Script de invocación
            var invokeScript = document.createElement('script');
            invokeScript.type = 'text/javascript';
            invokeScript.src = 'https://www.highperformanceformat.com/5a9a95855c3eee1eddafaafd625faa2e/invoke.js';
            invokeScript.async = true;
            bannerContainer.appendChild(invokeScript);
            
            console.log('📦 Banner fijo cargado en Ronda 3');
        }

        // ==========================================
        // FUNCIÓN: CAMBIAR RONDA
        // ==========================================
        function cambiarRonda(ronda) {
            rondaActual = ronda;
            console.log(`📍 Ronda ${ronda} activa`);
            
            if (ronda === 2) {
                cargarSocialBar();
            } else if (ronda === 3) {
                cargarBannerFijo();
            }
        }

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO
        // ==========================================
        function iniciarConteo() {
            if (activo) return;
            
            boton.className = 'btn-gris';
            boton.textContent = `⏳ Espere ${tiempoRestante}s`;
            boton.disabled = true;
            activo = true;
            
            cambiarRonda(1);
            
            let contadorRonda = DURACION_RONDA;
            let rondaTemp = 1;
            
            temporizador = setInterval(() => {
                tiempoRestante--;
                contadorRonda--;
                boton.textContent = `⏳ Espere ${tiempoRestante}s`;
                
                if (contadorRonda <= 0 && rondaTemp < 3) {
                    rondaTemp++;
                    contadorRonda = DURACION_RONDA;
                    cambiarRonda(rondaTemp);
                }
                
                if (tiempoRestante <= 0) {
                    clearInterval(temporizador);
                    boton.className = 'btn-verde';
                    boton.textContent = '✅ Continuar Reproducción';
                    boton.disabled = false;
                    activo = false;
                }
            }, 1000);
        }
    </script>

</body>
</html>
