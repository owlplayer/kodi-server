<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Adsterra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%;
            min-height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 5px;
        }
        
        /* ==========================================
           BANNER FIJO (Ronda 3) - Reducido verticalmente
           ========================================== */
        #banner-container {
            width: 300px;
            height: 250px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        #banner-container .placeholder {
            color: #444;
            font-size: 12px;
            text-align: center;
        }
        #banner-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* ==========================================
           SOCIAL BAR - Reducida verticalmente
           ========================================== */
        #social-bar-container {
            width: 100%;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ==========================================
           BOTÓN - Reducido vertical y horizontalmente
           ========================================== */
        .btn-verde {
            width: 240px;
            background-color: #28a745;
            color: white;
            padding: 10px 0;
            margin-top: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            transform: translateY(-50px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            line-height: 1.2;
        }
        .btn-verde .token {
            font-weight: normal;
            font-size: 9px;
            color: rgba(255,255,255,0.6);
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #999 !important;
            cursor: not-allowed !important;
            transform: translateY(-50px);
        }
        .btn-gris .token {
            color: rgba(255,255,255,0.3);
        }
        
        /* Empujar el botón hacia abajo */
        .contenido {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            max-width: 400px;
            padding: 10px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- ==========================================
         BANNER FIJO (Ronda 3) - Se carga en Ronda 3
         ========================================== -->
    <div id="banner-container">
        <div class="placeholder" id="banner-placeholder">
            ⏳ Cargando banner...
        </div>
    </div>

    <!-- ==========================================
         SOCIAL BAR (Ronda 2) - Se carga en Ronda 2
         ========================================== -->
    <div id="social-bar-container"></div>

    <!-- ==========================================
         BOTÓN (con token dentro)
         ========================================== -->
    <div class="contenido">
        <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">
            Desbloquear
            <span class="token" id="token-info">Token: PRUEBA-123</span>
        </button>
    </div>


    <script>
        // ==========================================
        // VARIABLES
        // ==========================================
        const DURACION_RONDA = 10;
        let tiempoRestante = DURACION_RONDA * 3; // 30s totales
        let rondaActual = 1;
        let activo = false;
        let temporizador = null;
        let socialBarCargada = false;
        let bannerCargado = false;
        let rondasIniciadas = false;
        
        const boton = document.getElementById('boton_descarga');
        const bannerContainer = document.getElementById('banner-container');
        const bannerPlaceholder = document.getElementById('banner-placeholder');
        const socialContainer = document.getElementById('social-bar-container');
        const tokenInfo = document.getElementById('token-info');

        // ==========================================
        // FUNCIÓN: CARGAR SOCIAL BAR (Ronda 2)
        // ==========================================
        function cargarSocialBar() {
            if (socialBarCargada) return;
            socialBarCargada = true;
            
            var script = document.createElement('script');
            script.src = 'https://pl30356267.effectivecpmnetwork.com/62/0c/5b/620c5bdb5407c0cb7f17f61490f4edea.js';
            script.async = true;
            document.body.appendChild(script);
            console.log('📦 Social Bar cargada en Ronda 2');
        }

        // ==========================================
        // FUNCIÓN: CARGAR BANNER FIJO (Ronda 3)
        // ==========================================
        function cargarBannerFijo() {
            if (bannerCargado) return;
            bannerCargado = true;
            
            bannerContainer.innerHTML = '';
            
            var configScript = document.createElement('script');
            configScript.type = 'text/javascript';
            configScript.textContent = `
                atOptions = {
                    'key' : '5a9a95855c3eee1eddafaafd625faa2e',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;
            bannerContainer.appendChild(configScript);
            
            var invokeScript = document.createElement('script');
            invokeScript.type = 'text/javascript';
            invokeScript.src = 'https://www.highperformanceformat.com/5a9a95855c3eee1eddafaafd625faa2e/invoke.js';
            invokeScript.async = true;
            bannerContainer.appendChild(invokeScript);
            
            console.log('📦 Banner fijo cargado en Ronda 3');
        }

        // ==========================================
        // FUNCIÓN: CAMBIAR RONDA
        // ==========================================
        function cambiarRonda(ronda) {
            rondaActual = ronda;
            console.log(`📍 Ronda ${ronda} activa`);
            
            if (ronda === 2) {
                cargarSocialBar();
            } else if (ronda === 3) {
                cargarBannerFijo();
            }
        }

        // ==========================================
        // FUNCIÓN: INICIAR RONDAS AUTOMÁTICAMENTE
        // ==========================================
        function iniciarRondas() {
            if (rondasIniciadas) return;
            rondasIniciadas = true;
            
            console.log('🚀 Rondas iniciadas automáticamente al cargar la página');
            
            cambiarRonda(1);
            
            let contadorRonda = DURACION_RONDA;
            let rondaTemp = 1;
            
            temporizador = setInterval(() => {
                tiempoRestante--;
                contadorRonda--;
                
                // Actualizar el texto del botón si está en modo gris (conteo activo)
                if (activo) {
                    boton.innerHTML = `
                        ⏳ Espere ${tiempoRestante}s
                        <span class="token">Token: PRUEBA-123</span>
                    `;
                }
                
                if (contadorRonda <= 0 && rondaTemp < 3) {
                    rondaTemp++;
                    contadorRonda = DURACION_RONDA;
                    cambiarRonda(rondaTemp);
                }
                
                if (tiempoRestante <= 0) {
                    clearInterval(temporizador);
                    if (activo) {
                        boton.className = 'btn-verde';
                        boton.innerHTML = `
                            ✅ Continuar Reproducción
                            <span class="token">Token: PRUEBA-123</span>
                        `;
                        boton.disabled = false;
                        activo = false;
                    }
                }
            }, 1000);
        }

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO (al presionar el botón)
        // ==========================================
        function iniciarConteo() {
            if (activo) return;
            
            boton.className = 'btn-gris';
            boton.innerHTML = `
                ⏳ Espere ${tiempoRestante}s
                <span class="token">Token: PRUEBA-123</span>
            `;
            boton.disabled = true;
            activo = true;
        }

        // ==========================================
        // LEER TOKEN DE LA URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            tokenInfo.textContent = 'Token: ' + token;
        }

        // ==========================================
        // 🚀 INICIAR RONDAS AL CARGAR LA PÁGINA
        // ==========================================
        window.addEventListener('load', function() {
            iniciarRondas();
        });
    </script>

</body>
</html>
