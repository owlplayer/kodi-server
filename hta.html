<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Adsterra - Social Bar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #111; 
            color: #fff;
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        
        .btn-verde {
            display: block;
            width: 300px;
            background-color: #28a745;
            color: white;
            padding: 14px 0;
            margin-top: 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #ccc !important;
            cursor: not-allowed !important;
        }
        
        .token-info {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
            word-break: break-all;
        }
        
        .estado-label {
            color: #555;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- ==========================================
         ESTADO
         ========================================== -->
    <p class="estado-label" id="estado_label">📦 Cargando Adsterra Social Bar...</p>

    <!-- ==========================================
         BOTÓN
         ========================================== -->
    <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">🔓 Desbloquear</button>

    <!-- ==========================================
         TOKEN
         ========================================== -->
    <div id="token-info" class="token-info">Token: PRUEBA-123</div>

    <!-- ==========================================
         🔥 ADSTERRA SOCIAL BAR
         (justo antes de cerrar </body>)
         ========================================== -->
    <script src="https://pl30356267.effectivecpmnetwork.com/62/0c/5b/620c5bdb5407c0cb7f17f61490f4edea.js"></script>

    <script>
        // ==========================================
        // VARIABLES
        // ==========================================
        const DURACION = 45;
        let tiempoRestante = DURACION;
        let activo = false;
        let temporizador = null;
        const boton = document.getElementById('boton_descarga');
        const estadoLabel = document.getElementById('estado_label');

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO
        // ==========================================
        function iniciarConteo() {
            if (activo) return;
            
            boton.className = 'btn-gris';
            boton.textContent = `⏳ Espere ${tiempoRestante} segundos...`;
            boton.disabled = true;
            activo = true;
            estadoLabel.textContent = '⏳ Conteo regresivo...';
            
            temporizador = setInterval(() => {
                tiempoRestante--;
                boton.textContent = `⏳ Espere ${tiempoRestante} segundos...`;
                
                if (tiempoRestante <= 0) {
                    clearInterval(temporizador);
                    boton.className = 'btn-verde';
                    boton.textContent = '✅ Continuar Reproducción';
                    boton.disabled = false;
                    activo = false;
                    estadoLabel.textContent = '✅ Prueba completada';
                }
            }, 1000);
        }

        // ==========================================
        // LEER TOKEN DE LA URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token-info').textContent = 'Token: ' + token;
        }
    </script>

</body>
</html>
