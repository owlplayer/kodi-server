<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargas Móviles</title>

    <!-- Librería Adcash (necesaria para Adcash) -->
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%;
            height: 100%;
            max-height: 100vh;
            overflow: hidden;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .contenedor {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            max-width: 320px;
            height: 100vh;
            max-height: 100vh;
            padding: 0;
            gap: 0;
        }

        /* ==========================================
           IN-PAGE PUSH (Adsterra o Adcash)
           ========================================== */
        .espacio-inpage {
            flex: 1;
            width: 100%;
            min-height: 50px;
            background-color: transparent;
            display: none;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .espacio-inpage.visible {
            display: flex;
        }

        /* ==========================================
           BANNER FIJO (Adcash)
           ========================================== */
        .banner-fijo {
            width: 300px;
            height: 250px;
            background-color: transparent;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            margin: 0;
        }
        .banner-fijo.visible {
            display: flex;
        }
        .banner-fijo iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ==========================================
           ESPACIO LIBRE (futuro banner)
           ========================================== */
        .espacio-libre {
            width: 300px;
            height: 250px;
            background-color: transparent;
            flex-shrink: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==========================================
           BOTÓN
           ========================================== */
        .btn-verde {
            width: 300px;
            background-color: #28a745;
            color: white;
            padding: 12px 0;
            margin: 0;
            border-radius: 0 0 8px 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            line-height: 1.2;
            flex-shrink: 0;
        }
        .btn-verde .token {
            font-weight: normal;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #999 !important;
            cursor: not-allowed !important;
        }
        .btn-gris .token {
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="contenedor">

        <!-- ==========================================
             IN-PAGE PUSH (Ronda 1: Adsterra, Ronda 3: Adcash)
             ========================================== -->
        <div id="espacio-inpage" class="espacio-inpage">
            <div id="contenedor-inpage"></div>
        </div>

        <!-- ==========================================
             BANNER FIJO (Adcash) - Ronda 2
             ========================================== -->
        <div id="banner-fijo" class="banner-fijo">
            <div>
                <script type="text/javascript">
                    aclib.runBanner({
                        zoneId: '11675566',
                    });
                </script>
            </div>
        </div>

        <!-- ==========================================
             ESPACIO LIBRE
             ========================================== -->
        <div id="espacio-libre" class="espacio-libre"></div>

        <!-- ==========================================
             BOTÓN
             ========================================== -->
        <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">
            Desbloquear
            <span class="token" id="token-info">Token: PRUEBA-123</span>
        </button>

    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN
        // ==========================================
        const DURACION_RONDA = 10;
        const TIEMPO_TOTAL = 30;
        let segundosRestantes = TIEMPO_TOTAL;
        let rondaActual = 1;
        let activo = false;
        let temporizadorRondas = null;
        let temporizadorBoton = null;
        let rondasIniciadas = false;
        let adsterraCargado = false;
        let adcashCargado = false;
        let bannerCargado = false;

        const boton = document.getElementById('boton_descarga');
        const espacioInpage = document.getElementById('espacio-inpage');
        const contenedorInpage = document.getElementById('contenedor-inpage');
        const bannerFijo = document.getElementById('banner-fijo');

        // ==========================================
        // FUNCIÓN: CARGAR IN-PAGE PUSH (Adsterra)
        // ==========================================
        function cargarAdsterraInpage() {
            if (adsterraCargado) return;
            adsterraCargado = true;

            contenedorInpage.innerHTML = '';

            var configScript = document.createElement('script');
            configScript.type = 'text/javascript';
            configScript.textContent = `
                atOptions = {
                    'key' : 'c7a0c6c1ac62646100fe3c77297f3b37',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            `;
            contenedorInpage.appendChild(configScript);

            var invokeScript = document.createElement('script');
            invokeScript.type = 'text/javascript';
            invokeScript.src = '//www.highperformanceformat.com/c7a0c6c1ac62646100fe3c77297f3b37/invoke.js';
            invokeScript.async = true;
            contenedorInpage.appendChild(invokeScript);

            console.log('📦 In-Page Push (Adsterra) cargado');
        }

        // ==========================================
        // FUNCIÓN: CARGAR IN-PAGE PUSH (Adcash)
        // ==========================================
        function cargarAdcashInpage() {
            if (adcashCargado) return;
            adcashCargado = true;

            contenedorInpage.innerHTML = '';

            var div = document.createElement('div');
            var script = document.createElement('script');
            script.type = 'text/javascript';
            script.textContent = `
                aclib.runInPagePush({
                    zoneId: '11701830',
                    maxAds: 2,
                });
            `;
            div.appendChild(script);
            contenedorInpage.appendChild(div);

            console.log('📦 In-Page Push (Adcash) cargado');
        }

        // ==========================================
        // FUNCIÓN: CARGAR BANNER FIJO (Adcash)
        // ==========================================
        function cargarBannerFijo() {
            if (bannerCargado) return;
            bannerCargado = true;

            bannerFijo.classList.add('visible');
            console.log('📦 Banner fijo (Adcash) cargado en Ronda 2');
        }

        // ==========================================
        // FUNCIÓN: CAMBIAR RONDA
        // ==========================================
        function cambiarRonda(ronda) {
            rondaActual = ronda;
            console.log(`📍 Ronda ${ronda} activa`);

            // Ocultar todo
            espacioInpage.classList.remove('visible');
            bannerFijo.classList.remove('visible');

            if (ronda === 1) {
                // Ronda 1: Adsterra In-Page
                cargarAdsterraInpage();
                espacioInpage.classList.add('visible');
                console.log('👁️ In-Page Push (Adsterra) visible - Ronda 1');
            } else if (ronda === 2) {
                // Ronda 2: Banner fijo Adcash
                cargarBannerFijo();
                console.log('👁️ Banner fijo (Adcash) visible - Ronda 2');
            } else if (ronda === 3) {
                // Ronda 3: Adcash In-Page
                cargarAdcashInpage();
                espacioInpage.classList.add('visible');
                console.log('👁️ In-Page Push (Adcash) visible - Ronda 3');
            }
        }

        // ==========================================
        // FUNCIÓN: INICIAR RONDAS (automático al cargar)
        // ==========================================
        function iniciarRondas() {
            if (rondasIniciadas) return;
            rondasIniciadas = true;

            console.log('🚀 Rondas iniciadas automáticamente al cargar');
            cambiarRonda(1);

            let contadorRonda = DURACION_RONDA;
            let rondaTemp = 1;

            temporizadorRondas = setInterval(() => {
                contadorRonda--;

                if (contadorRonda <= 0 && rondaTemp < 3) {
                    rondaTemp++;
                    contadorRonda = DURACION_RONDA;
                    cambiarRonda(rondaTemp);
                }

                if (rondaTemp >= 3 && contadorRonda <= 0) {
                    console.log('✅ Todas las rondas completadas');
                    espacioInpage.classList.remove('visible');
                    bannerFijo.classList.remove('visible');
                }
            }, 1000);
        }

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO DEL BOTÓN (30s fijos)
        // ==========================================
        function iniciarConteo() {
            if (activo) return;

            segundosRestantes = TIEMPO_TOTAL;

            boton.className = 'btn-gris';
            boton.innerHTML = `
                ⏳ Espere ${segundosRestantes}s
                <span class="token">Token: PRUEBA-123</span>
            `;
            boton.disabled = true;
            activo = true;

            if (temporizadorBoton) clearInterval(temporizadorBoton);

            temporizadorBoton = setInterval(() => {
                segundosRestantes--;
                boton.innerHTML = `
                    ⏳ Espere ${segundosRestantes}s
                    <span class="token">Token: PRUEBA-123</span>
                `;

                if (segundosRestantes <= 0) {
                    clearInterval(temporizadorBoton);
                    boton.className = 'btn-verde';
                    boton.innerHTML = `
                        ✅ Continuar Reproducción
                        <span class="token">Token: PRUEBA-123</span>
                    `;
                    boton.disabled = false;
                    activo = false;
                }
            }, 1000);
        }

        // ==========================================
        // LEER TOKEN DE LA URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token-info').textContent = 'Token: ' + token;
        }

        // ==========================================
        // INICIAR RONDAS AL CARGAR
        // ==========================================
        window.addEventListener('load', function() {
            iniciarRondas();
        });
    </script>

</body>
</html>
