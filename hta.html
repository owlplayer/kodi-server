<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Adsterra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%;
            min-height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        
        .contenido {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            padding-bottom: 20px;
        }
        
        /* ==========================================
           CUADROS DE 300x250 POR RONDA
           ========================================== */
        .ronda {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
            border: 1px dashed #333;
            padding: 10px;
            border-radius: 8px;
        }
        .ronda .label {
            color: #555;
            font-size: 11px;
            text-align: center;
            width: 100%;
            margin-bottom: 5px;
        }
        .cuadro {
            width: 300px;
            height: 250px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cuadro .placeholder {
            color: #444;
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }
        .cuadro .placeholder span {
            color: #555;
            font-size: 10px;
            display: block;
            margin-top: 4px;
        }
        
        /* ==========================================
           BOTÓN (50px hacia arriba)
           ========================================== */
        .btn-verde {
            width: 100%;
            max-width: 300px;
            background-color: #28a745;
            color: white;
            padding: 16px 0;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            transform: translateY(-50px);
        }
        .btn-verde:hover {
            background-color: #218838;
        }
        .btn-gris {
            background-color: #6c757d !important;
            color: #999 !important;
            cursor: not-allowed !important;
            transform: translateY(-50px);
        }
        
        .token-info {
            color: #444;
            font-size: 11px;
            margin-top: 8px;
            word-break: break-all;
            text-align: center;
            width: 100%;
            transform: translateY(-50px);
        }
    </style>
</head>
<body>

    <!-- ==========================================
         RONDA 1 (0-10s)
         ========================================== -->
    <div id="ronda1" class="ronda">
        <div class="label">📍 RONDA 1 (0-10s)</div>
        <div class="cuadro">
            <div class="placeholder">Cuadro 1A<br><span>Superior</span></div>
        </div>
        <div class="cuadro">
            <div class="placeholder">Cuadro 1B<br><span>Inferior</span></div>
        </div>
    </div>

    <!-- ==========================================
         RONDA 2 (10-20s)
         ========================================== -->
    <div id="ronda2" class="ronda" style="display:none;">
        <div class="label">📍 RONDA 2 (10-20s)</div>
        <div class="cuadro">
            <div class="placeholder">Cuadro 2A<br><span>Superior</span></div>
        </div>
        <div class="cuadro">
            <div class="placeholder">Cuadro 2B<br><span>Inferior</span></div>
        </div>
    </div>

    <!-- ==========================================
         RONDA 3 (20-30s)
         ========================================== -->
    <div id="ronda3" class="ronda" style="display:none;">
        <div class="label">📍 RONDA 3 (20-30s)</div>
        <div class="cuadro">
            <div class="placeholder">Cuadro 3A<br><span>Superior</span></div>
        </div>
        <div class="cuadro">
            <div class="placeholder">Cuadro 3B<br><span>Inferior</span></div>
        </div>
    </div>

    <!-- ==========================================
         BOTÓN + TOKEN
         ========================================== -->
    <div class="contenido">
        <button id="boton_descarga" class="btn-verde" onclick="iniciarConteo()">Desbloquear</button>
        <div id="token-info" class="token-info">Token: PRUEBA-123</div>
    </div>


    <script>
        // ==========================================
        // VARIABLES
        // ==========================================
        const DURACION_RONDA = 10;
        let tiempoRestante = DURACION_RONDA * 3;
        let rondaActual = 1;
        let activo = false;
        let temporizador = null;
        const boton = document.getElementById('boton_descarga');

        const ronda1 = document.getElementById('ronda1');
        const ronda2 = document.getElementById('ronda2');
        const ronda3 = document.getElementById('ronda3');

        // ==========================================
        // FUNCIÓN: CAMBIAR RONDA
        // ==========================================
        function cambiarRonda(ronda) {
            ronda1.style.display = 'none';
            ronda2.style.display = 'none';
            ronda3.style.display = 'none';

            if (ronda === 1) {
                ronda1.style.display = 'flex';
                console.log('📍 Ronda 1 activa');
            } else if (ronda === 2) {
                ronda2.style.display = 'flex';
                console.log('📍 Ronda 2 activa');
            } else if (ronda === 3) {
                ronda3.style.display = 'flex';
                console.log('📍 Ronda 3 activa');
            }
        }

        // ==========================================
        // FUNCIÓN: INICIAR CONTEO
        // ==========================================
        function iniciarConteo() {
            if (activo) return;
            
            boton.className = 'btn-gris';
            boton.textContent = `⏳ Espere ${tiempoRestante}s`;
            boton.disabled = true;
            activo = true;
            
            cambiarRonda(1);
            
            let contadorRonda = DURACION_RONDA;
            let rondaTemp = 1;
            
            temporizador = setInterval(() => {
                tiempoRestante--;
                contadorRonda--;
                boton.textContent = `⏳ Espere ${tiempoRestante}s`;
                
                if (contadorRonda <= 0 && rondaTemp < 3) {
                    rondaTemp++;
                    contadorRonda = DURACION_RONDA;
                    cambiarRonda(rondaTemp);
                }
                
                if (tiempoRestante <= 0) {
                    clearInterval(temporizador);
                    boton.className = 'btn-verde';
                    boton.textContent = '✅ Continuar Reproducción';
                    boton.disabled = false;
                    activo = false;
                }
            }, 1000);
        }
    </script>

</body>
</html>
